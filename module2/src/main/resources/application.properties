spring.application.name=module2
server.port=8081

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true  # Make sure the client registers itself with Eureka

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/society_db
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=Vg5iwkAhQSsWN5tpcWW0HS9TGIHMu1BvPuuYsCeXB7A=
jwt.expiration=86400000

# Spring Security Configuration
spring.security.user.name=admin
spring.security.user.password=adminpassword
spring.security.user.roles=ADMIN
module1.base.url=http://localhost:8080  # URL of Module 1 (assuming it's running on port 8081)
